<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111312" />
  <title>天坛 AR 场景版</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <style>
    :root { color-scheme: dark; font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; background: #111312; color: #f4f0e7; }
    * { box-sizing: border-box; }
    html, body, #app, #scene-root { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body, #scene-root { background: #111312; }
    button, a { font: inherit; }
    #scene-root { position: fixed; inset: 0; }
    .topbar { position: fixed; top: max(12px, env(safe-area-inset-top)); left: 12px; right: 12px; z-index: 10; min-height: 48px; display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 8px 10px; background: rgba(17, 19, 18, 0.86); border: 1px solid rgba(244, 240, 231, 0.22); border-radius: 8px; backdrop-filter: blur(14px); }
    .brand { min-width: 0; display: flex; align-items: center; gap: 9px; font-size: 14px; font-weight: 700; white-space: nowrap; }
    .brand-mark { width: 28px; height: 28px; display: grid; place-items: center; color: #0f1718; background: #e5b74f; border-radius: 50%; font-family: Georgia, serif; font-size: 17px; }
    .status { min-width: 0; display: flex; align-items: center; justify-content: flex-end; gap: 7px; color: #d8d3c8; font-size: 12px; text-align: right; }
    .status-dot { flex: 0 0 auto; width: 8px; height: 8px; border-radius: 50%; background: #e5b74f; box-shadow: 0 0 0 4px rgba(229, 183, 79, 0.16); }
    .status[data-state="found"] .status-dot { background: #74c69d; box-shadow: 0 0 0 4px rgba(116, 198, 157, 0.16); }
    .status[data-state="lost"] .status-dot { background: #df6b57; box-shadow: 0 0 0 4px rgba(223, 107, 87, 0.16); }
    .start-panel { position: fixed; left: 50%; bottom: max(18px, env(safe-area-inset-bottom)); z-index: 12; width: min(520px, calc(100% - 24px)); transform: translateX(-50%); padding: 18px; color: #1b1c1a; background: #f1ede3; border: 1px solid #d6cdbb; border-radius: 8px; box-shadow: 0 18px 50px rgba(0, 0, 0, 0.3); }
    .start-panel[hidden], .target-switcher[hidden], .icon-button[hidden], .mode-label[hidden] { display: none; }
    .eyebrow { margin: 0 0 6px; color: #855a21; font-size: 12px; font-weight: 700; }
    h1 { margin: 0; font-family: Georgia, "Songti SC", serif; font-size: clamp(24px, 6vw, 34px); line-height: 1.12; letter-spacing: 0; }
    .intro { margin: 9px 0 16px; color: #56564f; font-size: 14px; line-height: 1.6; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .action, .target-button, .icon-button { border: 0; cursor: pointer; transition: transform 160ms ease, background 160ms ease; }
    .action:active, .target-button:active, .icon-button:active { transform: scale(0.98); }
    .action { min-height: 46px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 14px; border-radius: 6px; font-weight: 700; text-decoration: none; }
    .action-primary { color: #f9f6ef; background: #16363d; }
    .action-secondary { color: #24251f; background: #ddd5c5; }
    .target-switcher { position: fixed; left: 12px; right: 12px; bottom: max(14px, env(safe-area-inset-bottom)); z-index: 10; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; padding: 6px; background: rgba(17, 19, 18, 0.88); border: 1px solid rgba(244, 240, 231, 0.22); border-radius: 8px; backdrop-filter: blur(14px); }
    .target-button { min-width: 0; height: 48px; padding: 6px 4px; color: #d8d3c8; background: transparent; border: 1px solid transparent; border-radius: 5px; font-size: 12px; line-height: 1.25; }
    .target-button[aria-pressed="true"] { color: #111312; background: #e5b74f; border-color: #f1cf81; font-weight: 700; }
    .icon-button { position: fixed; right: 12px; bottom: calc(max(14px, env(safe-area-inset-bottom)) + 66px); z-index: 11; width: 42px; height: 42px; display: grid; place-items: center; color: #f4f0e7; background: rgba(17, 19, 18, 0.88); border: 1px solid rgba(244, 240, 231, 0.22); border-radius: 50%; backdrop-filter: blur(14px); }
    .mode-label { position: fixed; left: 50%; top: calc(max(12px, env(safe-area-inset-top)) + 62px); z-index: 9; transform: translateX(-50%); width: max-content; max-width: calc(100% - 32px); padding: 7px 10px; color: #efeadd; background: rgba(17, 19, 18, 0.72); border-radius: 4px; font-size: 12px; pointer-events: none; backdrop-filter: blur(10px); }
    .a-enter-vr, .a-enter-ar, .mindar-ui-overlay, .mindar-ui-loading, .mindar-ui-scanning, .mindar-ui-compatibility { display: none !important; }
    @media (max-width: 430px) { .topbar { min-height: 44px; } .brand { font-size: 13px; } .brand-mark { width: 25px; height: 25px; } .status-text { max-width: 112px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; } .start-panel { padding: 16px; } .actions { grid-template-columns: 1fr; } .target-button { font-size: 11px; } }
  </style>
</head>
<body>
  <div id="app">
    <div id="scene-root" aria-hidden="true"></div>
    <header class="topbar">
      <div class="brand"><span class="brand-mark">天</span><span>天坛 AR · 场景版</span></div>
      <div id="status" class="status" data-state="ready" role="status" aria-live="polite"><span class="status-dot"></span><span id="status-text" class="status-text">三页场景已就绪</span></div>
    </header>
    <main id="start-panel" class="start-panel">
      <p class="eyebrow">第 6 / 22 / 27 页</p>
      <h1>书页里的场景，走出来</h1>
      <p class="intro">祈年殿完整环境旋转呈现；共享古今成为分层海报装置；市民进入有店铺、街道和动作的生活场景。</p>
      <div class="actions">
        <a class="action action-primary" href="?mode=ar"><i data-lucide="scan-line" aria-hidden="true"></i><span>启动相机 AR</span></a>
        <a class="action action-secondary" href="?mode=preview&target=0"><i data-lucide="box" aria-hidden="true"></i><span>查看效果预览</span></a>
      </div>
    </main>
    <div id="mode-label" class="mode-label" hidden></div>
    <nav id="target-switcher" class="target-switcher" aria-label="预览场景" hidden>
      <button class="target-button" data-target="0" type="button">天坛模型</button>
      <button class="target-button" data-target="1" type="button">海报立体</button>
      <button class="target-button" data-target="2" type="button">市井生活</button>
    </nav>
    <a id="home-button" class="icon-button" href="./" title="返回选择" aria-label="返回选择" hidden><i data-lucide="x" aria-hidden="true"></i></a>
  </div>
  <script src="./app.js"></script>
</body>
</html>
